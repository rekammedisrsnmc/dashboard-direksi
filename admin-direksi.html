<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="logorekammedis.ico">
<title>Admin Panel | RSU An'Nimah</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --green:#2fa36b;
  --green-dark:#1f7f53;
  --bg:#eef5f2;
  --card:#ffffff;
  --shadow:0 12px 30px rgba(0,0,0,.12);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
header{
  background:linear-gradient(135deg,#ffffff,#e9f7f0);
  padding:15px 20px;
  box-shadow:var(--shadow);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
.logo img{width:300px;height:70px;object-fit:contain;}
.logo .back-btn{
  margin-left:auto;
  background:#6c757d;
  color:#fff;
  padding:8px 18px;
  border-radius:40px;
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  transition:0.2s;
}
.logo .back-btn:hover{background:#5a6268;transform:scale(1.02);}
main{flex:1;padding:40px 20px}
.container{max-width:1000px;margin:auto;animation:fadeUp .6s ease;}
.panel-card{
  background:#fff;
  border-radius:28px;
  padding:35px;
  box-shadow:var(--shadow);
}
.panel-card h2{
  color:var(--green-dark);
  margin-bottom:25px;
  display:flex;
  align-items:center;
  gap:12px;
  font-size:28px;
}
.panel-card h2 i{color:var(--green);}
.section-label{
  font-size:13px;
  font-weight:700;
  color:var(--green-dark);
  background:var(--bg);
  padding:6px 16px;
  border-radius:20px;
  margin:10px 0 15px 0;
  display:inline-block;
}
.section-label i{margin-right:6px;}
.form-group{margin-bottom:20px;}
.form-group label{
  font-weight:600;
  color:#1f3b2f;
  display:block;
  margin-bottom:6px;
}
.form-group input, .form-group select{
  width:100%;
  padding:12px 16px;
  border:1.5px solid #d4e2dc;
  border-radius:14px;
  font-size:14px;
  transition:0.2s;
}
.form-group input:focus, .form-group select:focus{
  border-color:var(--green);
  outline:none;
  box-shadow:0 0 0 3px rgba(47,163,107,0.2);
}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.btn{
  padding:12px 24px;
  border:none;
  border-radius:40px;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:var(--green-dark);transform:scale(1.02);}
.btn-danger{background:#d9534f;color:#fff;}
.btn-danger:hover{background:#c9302c;}
.btn-warning{background:#f0ad4e;color:#fff;}
.btn-warning:hover{background:#ec971f;}
.btn-secondary{background:#6c757d;color:#fff;}
.btn-secondary:hover{background:#5a6268;}
.btn-sm{padding:6px 14px;font-size:13px;}
.mt-20{margin-top:20px;}
.mb-20{margin-bottom:20px;}
.mr-10{margin-right:10px;}
.item-list{
  margin-top:25px;
  border-top:2px solid #e8f5ee;
  padding-top:20px;
  min-height:100px;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 10px;
  border-bottom:1px solid #f0f5f2;
  transition:0.2s;
}
.item:hover{background:#f8fbf9;border-radius:8px;}
.item-info{flex:1;}
.item-info .label{font-weight:600;color:#1f3b2f;}
.item-info .url{font-size:12px;color:#888;display:block;margin-top:2px;}
.item-actions{display:flex;gap:8px;flex-shrink:0;}
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#1f7f53;
  color:#fff;
  padding:12px 28px;
  border-radius:40px;
  font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  display:none;
  z-index:9999;
}
.toast.show{display:block;animation:fadeUp 0.4s ease;}
.toast.error{background:#d9534f;}

/* ===== LOADING SPINNER ===== */
.spinner-sm{
  display:inline-block;
  width:20px;
  height:20px;
  border:3px solid #e0ece6;
  border-top:3px solid var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
.loading-item{
  text-align:center;
  padding:30px;
  color:#888;
}
.loading-item .spinner-sm{
  width:30px;
  height:30px;
  border-width:4px;
  display:block;
  margin:0 auto 12px auto;
}
.empty-state{text-align:center;padding:30px;color:#888;}
.empty-state i{font-size:40px;color:var(--green);opacity:0.3;display:block;margin-bottom:10px;}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}
@media(max-width:700px){
  .row-2{grid-template-columns:1fr;}
  .panel-card{padding:20px;}
  .item{flex-wrap:wrap;gap:10px;}
  .item-actions{margin-left:auto;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logopanjang.png" alt="Logo RSU An'Nimah">
    <a href="index-direksinew.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
  </div>
</header>

<main>
<div class="container">
  <div class="panel-card">
    <h2><i class="fas fa-edit"></i> Dashboard Admin - Input</h2>
    
    <!-- Form -->
    <div id="formContainer">
      <input type="hidden" id="editId" value="">
      
      <div class="form-group">
        <label>Pilih Bagian</label>
        <select id="cardSelect">
          <!-- MORNING DASHBOARD REVIEW -->
          <optgroup label="📊 MORNING DASHBOARD REVIEW">
            <option value="Indikator Operasional">Indikator Operasional</option>
            <option value="Indikator Keuangan">Indikator Keuangan</option>
            <option value="Indikator SDM">Indikator SDM</option>
            <option value="Mutu & Keselamatan Pasien">Mutu & Keselamatan Pasien</option>
            <option value="Digital & Infrastruktur">Digital & Infrastruktur</option>
            <option value="Indikator Kepatuhan BPJS">Indikator Kepatuhan BPJS</option>
            <option value="Indikator Kepatuhan Kemenkes">Indikator Kepatuhan Kemenkes</option>
          </optgroup>
          <!-- MONITORING & EVALUASI -->
          <optgroup label="📈 MONITORING & EVALUASI">
            <option value="Monitoring & Evaluasi Kinerja Berjenjang">Monitoring & Evaluasi Kinerja Berjenjang</option>
          </optgroup>
        </select>
      </div>
      
      <div class="row-2">
        <div class="form-group">
          <label>Judul</label>
          <input type="text" id="itemLabel" placeholder="Contoh: BOR, Pendapatan Harian" required>
        </div>
        <div class="form-group">
          <label>URL (Link)</label>
          <input type="url" id="itemUrl" placeholder="Isi link" required>
        </div>
      </div>
      
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="saveItemBtn"><i class="fas fa-save"></i> Tambah Item</button>
        <button class="btn btn-warning" id="refreshDataBtn"><i class="fas fa-sync"></i> Refresh</button>
        <button class="btn btn-danger" id="clearAllBtn"><i class="fas fa-trash"></i> Hapus Semua</button>
      </div>
    </div>

    <!-- Daftar Item -->
    <div class="item-list" id="itemListContainer">
      <div class="loading-item">
        <div class="spinner-sm"></div>
        <p>Memuat data...</p>
      </div>
    </div>
  </div>
</div>
</main>

<div class="toast" id="toastMsg"></div>

<script>
// ========== KONFIGURASI ==========
// GANTI dengan URL deployment Apps Script Anda
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby48X2eafSH41K6c6S4pCT6zCYdnjtsrIVj3l0HUG9OyHKfIa1BI_WF0c_ktRqKyZlD/exec';

// ========== STATE ==========
let currentData = [];
let isLoading = false;

// ========== DOM REFS ==========
const cardSelect = document.getElementById('cardSelect');
const itemLabel = document.getElementById('itemLabel');
const itemUrl = document.getElementById('itemUrl');
const editId = document.getElementById('editId');
const saveBtn = document.getElementById('saveItemBtn');
const resetBtn = document.getElementById('resetFormBtn');
const refreshBtn = document.getElementById('refreshDataBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const listContainer = document.getElementById('itemListContainer');
const toast = document.getElementById('toastMsg');

// ========== TOAST ==========
function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ========== SHOW LOADING ==========
function showLoadingList() {
  listContainer.innerHTML = `
    <div class="loading-item">
      <div class="spinner-sm"></div>
      <p>Memuat data...</p>
    </div>
  `;
}

// ========== LOAD DATA ==========
function loadData(callback) {
  if (isLoading) return;
  isLoading = true;
  showLoadingList();
  
  fetch(APPS_SCRIPT_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network error');
      return res.json();
    })
    .then(data => {
      if (data && data.length > 0) {
        currentData = data;
      } else {
        currentData = [];
      }
      if (callback) callback();
      populateList();
      showToast('✅ Data dimuat');
    })
    .catch(() => {
      currentData = [];
      if (callback) callback();
      populateList();
      showToast('⚠️ Gagal fetch, data kosong', true);
    })
    .finally(() => {
      isLoading = false;
    });
}

// ========== SAVE DATA ==========
function saveData(callback) {
  const originalText = saveBtn.innerHTML;
  saveBtn.innerHTML = '<span class="spinner-sm"></span> Menyimpan...';
  saveBtn.disabled = true;
  
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentData)
  })
  .then(() => {
    showToast('✅ Data tersimpan');
    if (callback) callback();
  })
  .catch(() => {
    showToast('⚠️ Gagal menyimpan', true);
    if (callback) callback();
  })
  .finally(() => {
    saveBtn.innerHTML = originalText;
    saveBtn.disabled = false;
  });
}

// ========== POPULATE LIST ==========
function populateList() {
  const cardName = cardSelect.value;
  const cardData = currentData.find(c => c.card === cardName);
  
  if (!cardData || cardData.items.length === 0) {
    listContainer.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-inbox"></i>
        <p>Tidak ada item untuk kartu ini. Tambahkan item di atas.</p>
      </div>
    `;
    return;
  }
  
  // Tentukan section label
  let sectionLabel = '';
  if (cardName === 'Monitoring & Evaluasi Kinerja Berjenjang') {
    sectionLabel = '📈 MONITORING & EVALUASI';
  } else {
    sectionLabel = '📊 MORNING DASHBOARD REVIEW';
  }
  
  let html = `
    <p style="font-weight:600;margin-bottom:5px;">📋 ${cardName}</p>
    <p style="font-size:12px;color:#888;margin-bottom:12px;">${sectionLabel} • ${cardData.items.length} item</p>
  `;
  
  cardData.items.forEach((item, idx) => {
    const shortUrl = item.url.length > 50 ? item.url.slice(0,50)+'…' : item.url;
    html += `
      <div class="item" data-idx="${idx}">
        <div class="item-info">
          <span class="label">${item.label}</span>
          <span class="url">${shortUrl}</span>
        </div>
        <div class="item-actions">
          <button class="btn btn-warning btn-sm edit-btn" data-card="${cardName}" data-idx="${idx}">
            <i class="fas fa-pen"></i> Edit
          </button>
          <button class="btn btn-danger btn-sm delete-btn" data-card="${cardName}" data-idx="${idx}">
            <i class="fas fa-trash"></i> Hapus
          </button>
        </div>
      </div>
    `;
  });
  listContainer.innerHTML = html;

  // Event listener untuk tombol edit
  listContainer.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const card = this.dataset.card;
      const idx = parseInt(this.dataset.idx);
      const cardData = currentData.find(c => c.card === card);
      if (!cardData) return;
      const item = cardData.items[idx];
      cardSelect.value = card;
      itemLabel.value = item.label;
      itemUrl.value = item.url;
      editId.value = `${card}|${idx}`;
      saveBtn.innerHTML = '<i class="fas fa-edit"></i> Update Item';
      showToast('✏️ Edit item, lalu klik Update');
    });
  });

  // Event listener untuk tombol hapus
  listContainer.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const card = this.dataset.card;
      const idx = parseInt(this.dataset.idx);
      const cardData = currentData.find(c => c.card === card);
      if (!cardData) return;
      const item = cardData.items[idx];
      if (confirm(`Hapus item "${item.label}" ?`)) {
        cardData.items.splice(idx, 1);
        saveData(() => {
          populateList();
          showToast('🗑️ Item dihapus');
        });
      }
    });
  });
}

// ========== RESET FORM ==========
function resetForm() {
  itemLabel.value = '';
  itemUrl.value = '';
  editId.value = '';
  saveBtn.innerHTML = '<i class="fas fa-save"></i> Tambah Item';
}

// ========== EVENT LISTENERS ==========

// Simpan / Update
saveBtn.addEventListener('click', function() {
  const card = cardSelect.value;
  const label = itemLabel.value.trim();
  const url = itemUrl.value.trim();
  
  if (!label || !url) {
    showToast('⚠️ Label dan URL harus diisi', true);
    return;
  }

  let cardData = currentData.find(c => c.card === card);
  if (!cardData) {
    cardData = { card, items: [] };
    currentData.push(cardData);
  }

  const editVal = editId.value;
  if (editVal) {
    // Update
    const [oldCard, idx] = editVal.split('|');
    const oldCardData = currentData.find(c => c.card === oldCard);
    if (oldCardData && oldCardData.items[parseInt(idx)]) {
      if (oldCard === card) {
        oldCardData.items[parseInt(idx)] = { label, url };
      } else {
        oldCardData.items.splice(parseInt(idx), 1);
        cardData.items.push({ label, url });
      }
    }
    editId.value = '';
    saveBtn.innerHTML = '<i class="fas fa-save"></i> Tambah Item';
  } else {
    // Tambah baru
    cardData.items.push({ label, url });
  }

  saveData(() => {
    populateList();
    resetForm();
    showToast('✅ Item tersimpan');
  });
});

// Reset Form
resetBtn.addEventListener('click', resetForm);

// Refresh Data
refreshBtn.addEventListener('click', () => {
  loadData();
  showToast('🔄 Memuat ulang data…');
});

// Clear All Data
clearAllBtn.addEventListener('click', () => {
  if (confirm('⚠️ Hapus SEMUA data? Ini tidak bisa dibatalkan!')) {
    currentData = [];
    saveData(() => {
      populateList();
      showToast('🗑️ Semua data dihapus');
    });
  }
});

// Ganti kartu -> refresh list
cardSelect.addEventListener('change', populateList);

// ========== INIT ==========
loadData();
</script>
</body>
</html>
