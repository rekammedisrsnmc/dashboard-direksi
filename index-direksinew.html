<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="logorekammedis.ico">
<title>Dashboard Direksi | RSU An'Nimah</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --green:#2fa36b;
  --green-dark:#1f7f53;
  --green-light:#e8f5ee;
  --bg:#eef5f2;
  --card:#ffffff;
  --shadow:0 12px 30px rgba(0,0,0,.12);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
header{
  background:linear-gradient(135deg,#ffffff,#e9f7f0);
  padding:15px 20px;
  box-shadow:var(--shadow);
  position:sticky;
  top:0;
  z-index:100;
  transition:box-shadow 0.3s ease, background 0.3s ease;
}
header.scrolled{box-shadow:0 8px 32px rgba(0,0,0,0.25);background:#ffffff;}
.logo{display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
.logo img{width:300px;height:70px;object-fit:contain;}
.logo .admin-badge{
  margin-left:auto;
  background:var(--green);
  color:#fff;
  padding:8px 18px;
  border-radius:40px;
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 4px 10px rgba(47,163,107,0.3);
  transition:0.2s;
  text-decoration:none;
}
.logo .admin-badge:hover{background:var(--green-dark);transform:scale(1.02);}
main{flex:1;padding:40px 20px}
.container{max-width:1200px;margin:auto;animation:fadeUp .6s ease;}
.section-divider{
  display:flex;
  align-items:center;
  gap:18px;
  margin:45px 0 35px 0;
}
.section-divider .line{
  flex:1;
  height:2px;
  background:linear-gradient(to right, transparent, var(--green), transparent);
}
.section-divider .label{
  font-size:13px;
  font-weight:700;
  color:var(--green-dark);
  background:#fff;
  padding:6px 20px;
  border-radius:30px;
  box-shadow:var(--shadow);
  letter-spacing:1px;
  text-transform:uppercase;
  white-space:nowrap;
}
.section-divider .label i{margin-right:8px;}
.title-container{
  background:#fff;
  border-radius:22px;
  padding:30px;
  box-shadow:var(--shadow);
  display:flex;
  gap:20px;
  align-items:center;
  margin-bottom:40px;
}
.title-icon{font-size:40px;color:var(--green);}
.title-text h1{font-size:34px;color:var(--green-dark);}
.title-text p{margin-top:6px;color:#555;font-size:15px;}
.indicator-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:24px;
}
.indicator-card{
  background:#fff;
  border-radius:22px;
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:.3s;
  display:flex;
  flex-direction:column;
}
.indicator-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.12);
}
.card-header{
  background:var(--bg);
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid #e0ece6;
  flex-shrink:0;
}
.card-header i{
  font-size:20px;
  color:var(--green);
  width:36px;
  height:36px;
  background:#fff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.card-header h3{font-size:15px;color:var(--green-dark);font-weight:700;}
.card-body{padding:12px 8px 12px 20px;flex:1;}
.card-body ul{list-style:none;}
.card-body ul li{
  padding:8px 12px 8px 0;
  border-bottom:1px solid #f5f5f5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:14px;
  color:#444;
  transition:.2s;
}
.card-body ul li:last-child{border-bottom:0;}
.card-body ul li:hover{
  background:#f8fbf9;
  padding-left:6px;
  border-radius:6px;
}
.card-body ul li .link-icon{
  color:var(--green);
  text-decoration:none;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:500;
  padding:4px 12px;
  border-radius:20px;
  background:var(--bg);
  transition:.3s;
  white-space:nowrap;
  flex-shrink:0;
}
.card-body ul li .link-icon:hover{
  background:#097e5bc2;
  color:#fff;
}
.card-body ul li .link-icon i{font-size:12px;}
.grid-divider{grid-column:1 / -1;margin:10px 0 5px 0;}

/* ===== LOADING SPINNER ===== */
.spinner-container{
  grid-column:1/-1;
  text-align:center;
  padding:80px 20px;
}
.spinner{
  display:inline-block;
  width:50px;
  height:50px;
  border:4px solid #e0ece6;
  border-top:4px solid var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
.spinner-container p{
  margin-top:16px;
  color:#888;
  font-size:15px;
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:#888;
  grid-column:1/-1;
}
.empty-state i{font-size:60px;color:var(--green);opacity:0.3;margin-bottom:20px;display:block;}
.empty-state h3{color:#555;margin-bottom:10px;}

footer{
  background:#fff;
  padding:30px 20px;
  color:#444;
  box-shadow:var(--shadow);
  margin-top:20px;
}
.small{font-size:14px;color:#666}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}
@media(max-width:900px){
  .indicator-grid{grid-template-columns:1fr;}
  .title-text h1{font-size:26px;}
  .logo img{width:200px;height:50px;}
  .logo .admin-badge{margin-left:0;width:100%;justify-content:center;}
}
@media(max-width:500px){
  .logo img{width:150px;height:40px;}
  .section-divider .label{font-size:11px;padding:4px 14px;}
}
</style>
</head>
<body>

<header id="mainHeader">
  <div class="logo">
    <img src="logopanjang.png" alt="Logo RSU An'Nimah">
    <a href="admin-direksi.html" class="admin-badge">
      <i class="fas fa-user-cog"></i> Admin Panel
    </a>
  </div>
</header>

<main>
<div class="container">
  <div class="title-container">
    <div class="title-icon"><i class="fas fa-clipboard-list"></i></div>
    <div class="title-text">
      <h1>DASHBOARD DIREKSI</h1>
      <p>Morning Review - Ringkasan Kinerja Harian RSU An'Nimah</p>
    </div>
  </div>
  <div class="indicator-grid" id="dashboardGrid">
    <!-- Loading spinner akan muncul di sini -->
    <div class="spinner-container">
      <div class="spinner"></div>
      <p>Memuat data...</p>
    </div>
  </div>
</div>
</main>

<footer>
  <strong>MEDICAL RECORD</strong>
  <div class="small">© 2025 RSU An'Nimah • Unit Rekam Medis</div>
</footer>

<script>
// ========== KONFIGURASI ==========
// GANTI dengan URL deployment Apps Script Anda
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby48X2eafSH41K6c6S4pCT6zCYdnjtsrIVj3l0HUG9OyHKfIa1BI_WF0c_ktRqKyZlD/exec';

// ========== RENDER DASHBOARD ==========
function renderDashboard(data) {
  const grid = document.getElementById('dashboardGrid');
  
  if (!data || data.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-database"></i>
        <h3>Belum Ada Data</h3>
        <p>Silakan input data melalui <a href="admin.html" style="color:var(--green);font-weight:600;">Admin Panel</a></p>
      </div>
    `;
    return;
  }

  // Pisahkan data menjadi 2 kelompok
  const morningData = [];
  const monitoringData = [];
  
  data.forEach(card => {
    if (card.card === 'Monitoring & Evaluasi Kinerja Berjenjang') {
      monitoringData.push(card);
    } else {
      morningData.push(card);
    }
  });

  let html = '';
  
  // ===== SECTION 1: MORNING DASHBOARD REVIEW =====
  if (morningData.length > 0) {
    html += `
      <div class="section-divider grid-divider">
        <span class="line"></span>
        <span class="label"><i class="fas fa-chart-pie"></i> MORNING DASHBOARD REVIEW</span>
        <span class="line"></span>
      </div>
    `;

    morningData.forEach((card) => {
      let icon = 'fa-chart-simple';
      if (card.card.includes('Operasional')) icon = 'fa-hospital-user';
      else if (card.card.includes('Keuangan')) icon = 'fa-coins';
      else if (card.card.includes('SDM')) icon = 'fa-user-md';
      else if (card.card.includes('Mutu') || card.card.includes('Keselamatan')) icon = 'fa-shield-alt';
      else if (card.card.includes('Digital') || card.card.includes('Infrastruktur')) icon = 'fa-microchip';
      else if (card.card.includes('BPJS')) icon = 'fa-handshake';
      else if (card.card.includes('Kemenkes')) icon = 'fa-building';

      html += `
        <div class="indicator-card" data-card="${card.card}">
          <div class="card-header">
            <i class="fas ${icon}"></i>
            <h3>${card.card.toUpperCase()}</h3>
          </div>
          <div class="card-body">
            <ul>
      `;
      card.items.forEach(item => {
        html += `
          <li>
            ${item.label}
            <a href="${item.url}" target="_blank" class="link-icon">
              <i class="fas fa-external-link-alt"></i> Lihat
            </a>
          </li>
        `;
      });
      html += `</ul></div></div>`;
    });
  }

  // ===== SECTION 2: MONITORING & EVALUASI =====
  if (monitoringData.length > 0) {
    // Jika ada data morning, tambahkan divider. Jika tidak, langsung tampilkan
    if (morningData.length > 0) {
      html += `
        <div class="section-divider grid-divider">
          <span class="line"></span>
          <span class="label"><i class="fas fa-chart-line"></i> MONITORING & EVALUASI</span>
          <span class="line"></span>
        </div>
      `;
    } else {
      // Jika tidak ada morning data, tampilkan divider tetap
      html += `
        <div class="section-divider grid-divider">
          <span class="line"></span>
          <span class="label"><i class="fas fa-chart-line"></i> MONITORING & EVALUASI</span>
          <span class="line"></span>
        </div>
      `;
    }

    monitoringData.forEach((card) => {
      html += `
        <div class="indicator-card" data-card="${card.card}">
          <div class="card-header">
            <i class="fas fa-chart-line"></i>
            <h3>${card.card.toUpperCase()}</h3>
          </div>
          <div class="card-body">
            <ul>
      `;
      card.items.forEach(item => {
        html += `
          <li>
            ${item.label}
            <a href="${item.url}" target="_blank" class="link-icon">
              <i class="fas fa-external-link-alt"></i> Lihat
            </a>
          </li>
        `;
      });
      html += `</ul></div></div>`;
    });
  }

  // Jika tidak ada data sama sekali
  if (morningData.length === 0 && monitoringData.length === 0) {
    html = `
      <div class="empty-state">
        <i class="fas fa-database"></i>
        <h3>Belum Ada Data</h3>
        <p>Silakan input data melalui <a href="admin.html" style="color:var(--green);font-weight:600;">Admin Panel</a></p>
      </div>
    `;
  }

  grid.innerHTML = html;
}

// ========== SHOW LOADING ==========
function showLoading() {
  const grid = document.getElementById('dashboardGrid');
  grid.innerHTML = `
    <div class="spinner-container">
      <div class="spinner"></div>
      <p>Memuat data...</p>
    </div>
  `;
}

// ========== LOAD DATA ==========
function loadData() {
  showLoading();
  
  fetch(APPS_SCRIPT_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network error');
      return res.json();
    })
    .then(data => {
      renderDashboard(data);
    })
    .catch(() => {
      const grid = document.getElementById('dashboardGrid');
      grid.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Gagal Memuat Data</h3>
          <p>Periksa koneksi atau <a href="#" onclick="loadData();return false;" style="color:var(--green);font-weight:600;">coba lagi</a></p>
        </div>
      `;
    });
}

// ========== INIT ==========
loadData();

// Header scroll shadow
const header = document.getElementById('mainHeader');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 10);
});
</script>
</body>
</html>
